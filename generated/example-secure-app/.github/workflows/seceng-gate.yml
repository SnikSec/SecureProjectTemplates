name: SecEng Governance Gate

on:
  pull_request:
    branches: [main]

jobs:
  harness-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/checkout@v3
        with:
          repository: SecEng-Harness
          path: tools/harness
      - name: Validate mission
        run: |
          cd tools/harness
          pip install -r requirements.txt
          python tools/validate_mission.py validate-mission --mission ../../mission.yaml

  policy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/checkout@v3
        with:
          repository: SecEng-PolicyEngine
          path: tools/policy-engine
      - name: Evaluate policy
        run: |
          cd tools/policy-engine
          pip install -r requirements.txt
          python tools/evaluate_policy.py evaluate --policy ../../policy.yaml --risk-tier low

  devils-advocate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v3
      - uses: actions/checkout@v3
        with:
          repository: SecEng-DevilsAdvocate
          path: tools/devils-advocate
      - name: Challenge PR description
        run: |
          cd tools/devils-advocate
          pip install -r requirements.txt
          echo "Recommendation challenge gate enabled"
