schema_version: "v1.0"
workflow_id: TEMPLATE_PROJECT_NAME-workflow
complexity_level: chained
stages:
  - stage_id: stage-001
    name: build
    actor: local-runner
    allowed_actions:
      - install-requirements
      - lint
    retries: 1
    requires_human_approval: false
  - stage_id: stage-002
    name: test
    actor: local-runner
    allowed_actions:
      - run-tests
    retries: 1
    requires_human_approval: false
  - stage_id: stage-003
    name: validate
    actor: local-runner
    allowed_actions:
      - validate-mission
      - evaluate-policy
    retries: 1
    requires_human_approval: false
  - stage_id: stage-004
    name: release
    actor: local-runner
    allowed_actions:
      - tag-release
    retries: 0
    requires_human_approval: true
stop_conditions:
  max_iterations: 5
  max_writes: 5
  halt_on_policy_fail: true
  halt_on_challenge_fail: true
